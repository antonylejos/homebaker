---
# Rotate Grafana admin password.
# 1. Calls the Grafana REST API to change the admin password.
# 2. Updates (or creates) the grafana-admin-secret Kubernetes secret.
#
# Usage:
#   ansible-playbook ansible/playbooks/rotate-grafana-password.yml \
#     -e "grafana_url=http://34.x.x.x new_password=MyN3wP@ssword"
#
# Prerequisites:
#   - kubectl configured and pointing at the correct cluster
#   - Current admin password known (passed via current_password, default: admin)

- name: Rotate Grafana admin password
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    grafana_url: "http://localhost:3000"
    new_password: "{{ new_password }}"
    current_password: "admin"
    grafana_admin_user: "admin"
    k8s_namespace: "inventory-platform"
    k8s_secret_name: "grafana-admin-secret"

  tasks:
    - name: Validate new_password is provided
      ansible.builtin.assert:
        that:
          - new_password is defined and new_password | length >= 8
        fail_msg: "new_password must be provided and at least 8 characters long."

    - name: Change Grafana admin password via API
      ansible.builtin.uri:
        url: "{{ grafana_url }}/api/user/password"
        method: PUT
        user: "{{ grafana_admin_user }}"
        password: "{{ current_password }}"
        force_basic_auth: true
        body_format: json
        body:
          oldPassword: "{{ current_password }}"
          newPassword: "{{ new_password }}"
          confirmNew: "{{ new_password }}"
        headers:
          Content-Type: "application/json"
        status_code: [200]
        timeout: 15
      register: grafana_response

    - name: Print Grafana API response
      ansible.builtin.debug:
        msg: "Grafana password change response: {{ grafana_response.json | default(grafana_response.content) }}"

    - name: Base64-encode new password for Kubernetes secret
      ansible.builtin.set_fact:
        new_password_b64: "{{ new_password | b64encode }}"

    - name: Update grafana-admin-secret Kubernetes secret
      ansible.builtin.command: >
        kubectl create secret generic {{ k8s_secret_name }}
        --namespace {{ k8s_namespace }}
        --from-literal=admin-password={{ new_password }}
        --from-literal=admin-user={{ grafana_admin_user }}
        --save-config
        --dry-run=client
        -o yaml
      register: secret_yaml
      changed_when: false

    - name: Apply updated secret to the cluster
      ansible.builtin.shell: |
        kubectl create secret generic {{ k8s_secret_name }} \
          --namespace {{ k8s_namespace }} \
          --from-literal=admin-password={{ new_password }} \
          --from-literal=admin-user={{ grafana_admin_user }} \
          --save-config \
          --dry-run=client \
          -o yaml | kubectl apply -f -
      register: apply_secret
      changed_when: "'configured' in apply_secret.stdout or 'created' in apply_secret.stdout"

    - name: Print secret apply result
      ansible.builtin.debug:
        msg: "{{ apply_secret.stdout }}"

    - name: Restart Grafana deployment to pick up new secret
      ansible.builtin.command: >
        kubectl rollout restart deployment/grafana
        --namespace {{ k8s_namespace }}
      register: rollout_restart
      changed_when: "'restarted' in rollout_restart.stdout"

    - name: Wait for Grafana rollout to complete
      ansible.builtin.command: >
        kubectl rollout status deployment/grafana
        --namespace {{ k8s_namespace }}
        --timeout=120s
      register: rollout_status
      changed_when: false

    - name: Print rollout status
      ansible.builtin.debug:
        msg: "{{ rollout_status.stdout }}"

    - name: Summary
      ansible.builtin.debug:
        msg: |
          ============================================================
          Grafana password rotation complete
          ============================================================
          Grafana URL   : {{ grafana_url }}
          Admin user    : {{ grafana_admin_user }}
          K8s secret    : {{ k8s_secret_name }} (namespace: {{ k8s_namespace }})
          Deployment    : restarted and healthy
          ============================================================
