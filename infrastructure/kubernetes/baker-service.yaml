apiVersion: apps/v1
kind: Deployment
metadata:
  name: baker-service
  namespace: homebaker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: baker-service
  template:
    metadata:
      labels:
        app: baker-service
    spec:
      containers:
        - name: baker-service
          image: YOUR_ACR_NAME.azurecr.io/baker-service:latest
          ports:
            - containerPort: 4001
          env:
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: supabase-secret
                  key: url
            - name: SUPABASE_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secret
                  key: key
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
